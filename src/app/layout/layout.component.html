<div class="flex h-screen overflow-hidden" style="background-color: #f8f9fa;">

  <!-- OVERLAY MÓVIL -->
  <div *ngIf="menuAbierto"
       class="md:hidden fixed inset-0 bg-black-alpha-60"
       style="z-index: 998;"
       (click)="cerrarMenu()">
  </div>

  <!-- SIDEBAR -->
  <div class="flex-column shadow-8 transition-transform transition-duration-300"
       [ngClass]="menuAbierto ? 'flex fixed top-0 left-0 h-full' : 'hidden md:flex relative h-full'"
       style="width: 17rem; z-index: 999; background-color: #1e1e2e;">

    <!-- CABECERA -->
    <div class="flex align-items-center justify-content-between p-4"
         style="border-bottom: 1px solid #2e2e3e;">
      <div class="flex align-items-center gap-3">
        <div class="bg-primary flex align-items-center justify-content-center border-round-lg shadow-2"
             style="width: 40px; height: 40px;">
          <i class="pi pi-briefcase text-white text-xl"></i>
        </div>
        <div class="flex flex-column">
          <span class="text-xl font-bold" style="color: #ffffff;">COTIZADOR</span>
          <span class="text-xs font-bold uppercase" style="color: #888;">
            {{ empresaActiva?.nombre_comercial || 'Administración' }}
          </span>
        </div>
      </div>
      <button pButton icon="pi pi-times"
              class="p-button-rounded p-button-text md:hidden p-0"
              style="color: #aaa; z-index: 1000; position: relative;"
              (click)="cerrarMenu()">
      </button>
    </div>

    <!-- NAVEGACIÓN -->
    <div class="flex-grow-1 overflow-y-auto px-3 py-4 flex flex-column gap-2">

      <span class="text-xs font-bold uppercase pl-2 mb-2" style="color: #666;">
        Ventas & Cotizaciones
      </span>

      <a routerLink="/cotizador"
   routerLinkActive #rlaCot="routerLinkActive"
   (click)="cerrarMenu()"
   class="flex align-items-center gap-3 p-3 border-round-lg cursor-pointer text-decoration-none transition-colors transition-duration-200"
   [style.background-color]="rlaCot.isActive ? 'var(--primary-color)' : 'transparent'"
   [style.color]="rlaCot.isActive ? '#fff' : '#ccc'">
  <i class="pi pi-plus-circle text-lg"></i>
  <span class="font-bold">Nueva Cotización</span>
</a>

<a routerLink="/historial"
   routerLinkActive #rlaHis="routerLinkActive"
   (click)="cerrarMenu()"
   class="flex align-items-center gap-3 p-3 border-round-lg cursor-pointer text-decoration-none transition-colors transition-duration-200"
   [style.background-color]="rlaHis.isActive ? 'var(--primary-color)' : 'transparent'"
   [style.color]="rlaHis.isActive ? '#fff' : '#ccc'">
  <i class="pi pi-book text-lg"></i>
  <span class="font-bold">Historial de Ventas</span>
</a>

<a routerLink="/productos"
   routerLinkActive #rlaPro="routerLinkActive"
   (click)="cerrarMenu()"
   class="flex align-items-center gap-3 p-3 border-round-lg cursor-pointer text-decoration-none transition-colors transition-duration-200"
   [style.background-color]="rlaPro.isActive ? 'var(--primary-color)' : 'transparent'"
   [style.color]="rlaPro.isActive ? '#fff' : '#ccc'">
  <i class="pi pi-box text-lg"></i>
  <span class="font-medium">Catálogo / Productos</span>
</a>

<a routerLink="/clientes"
   routerLinkActive #rlaCli="routerLinkActive"
   (click)="cerrarMenu()"
   class="flex align-items-center gap-3 p-3 border-round-lg cursor-pointer text-decoration-none transition-colors transition-duration-200"
   [style.background-color]="rlaCli.isActive ? 'var(--primary-color)' : 'transparent'"
   [style.color]="rlaCli.isActive ? '#fff' : '#ccc'">
  <i class="pi pi-users text-lg"></i>
  <span class="font-medium">Directorio Clientes</span>
</a>
    </div>

    <!-- VOLVER AL ADMIN (solo admin) -->
    <ng-container *ngIf="esAdmin">
      <div class="mx-3 my-2" style="border-top: 1px solid #2e2e3e;"></div>
      <button (click)="volverAlAdmin()"
              class="flex align-items-center gap-3 p-3 mx-3 border-round-lg cursor-pointer border-none w-auto transition-colors transition-duration-200"
              style="background: transparent; color: #facc15;">
        <i class="pi pi-arrow-left"></i>
        <span class="font-medium text-sm">Panel Admin</span>
      </button>
    </ng-container>

    <!-- FOOTER -->
    <div class="p-3" style="border-top: 1px solid #2e2e3e; background-color: #1e1e2e;">
      <div class="flex align-items-center gap-3 mb-3 p-2 border-round-lg"
           style="background-color: #2e2e3e;">
        <p-avatar icon="pi pi-user" styleClass="bg-primary text-white font-bold" shape="circle" />
        <div class="flex flex-column overflow-hidden">
          <span class="font-bold text-sm" style="color: #ddd;">
            {{ esAdmin ? 'Administrador' : 'Vendedor' }}
          </span>
          <span class="text-xs white-space-nowrap text-overflow-ellipsis overflow-hidden"
                style="color: #888;"
                [title]="usuarioActivo">
            {{ usuarioActivo }}
          </span>
        </div>
      </div>
      <button pButton icon="pi pi-sign-out" label="Cerrar Sesión"
              class="p-button-outlined p-button-danger w-full font-bold"
              (click)="cerrarSesion()">
      </button>
    </div>

  </div>

  <!-- ÁREA PRINCIPAL -->
  <div class="flex-1 flex flex-column h-full relative overflow-hidden">

    <!-- TOPBAR MÓVIL -->
    <div class="md:hidden flex-shrink-0 sticky top-0 h-4rem surface-0 border-bottom-1 surface-border shadow-2
                flex align-items-center px-3" style="z-index: 900;">
      <button pButton icon="pi pi-bars"
              class="p-button-text p-button-secondary text-2xl p-0"
              (click)="toggleMenu()">
      </button>
      <span class="ml-3 font-bold text-900 text-xl">
        {{ empresaActiva?.nombre_comercial || 'Administración' }}
      </span>
    </div>

    <!-- CONTENIDO -->
    <div class="flex-1 overflow-auto p-2 md:p-4">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
