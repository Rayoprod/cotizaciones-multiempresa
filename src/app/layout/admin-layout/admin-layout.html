<div class="flex h-screen overflow-hidden" style="background-color: #f8f9fa;">

  <!-- OVERLAY MÓVIL -->
  <div *ngIf="sidebarAbierto()"
       class="md:hidden fixed inset-0 bg-black-alpha-60"
       style="z-index: 998;"
       (click)="cerrarMenu()">
  </div>

  <!-- SIDEBAR -->
  <div class="flex-column shadow-8 transition-transform transition-duration-300"
       [ngClass]="sidebarAbierto() ? 'flex fixed top-0 left-0 h-full' : 'hidden md:flex relative h-full'"
       style="width: 17rem; z-index: 999; background-color: #1e1e2e;">

    <!-- CABECERA -->
    <div class="flex align-items-center justify-content-between p-4"
         style="border-bottom: 1px solid #2e2e3e;">
      <div class="flex align-items-center gap-3">
        <div class="bg-primary flex align-items-center justify-content-center border-round-lg shadow-2"
             style="width: 40px; height: 40px;">
          <i class="pi pi-shield-check text-white text-xl"></i>
        </div>

        <div class="flex flex-column">
          <span class="text-xl font-bold" style="color: #ffffff;">PANEL ADMIN</span>
          <span class="text-xs font-bold uppercase" style="color: #888;">
            {{ usuarioNombre() }}
          </span>
        </div>
      </div>

      <button pButton
              icon="pi pi-times"
              class="p-button-rounded p-button-text md:hidden p-0"
              style="color: #aaa; z-index: 1000; position: relative;"
              (click)="cerrarMenu()">
      </button>
    </div>

    <!-- NAVEGACIÓN -->
    <div class="flex-grow-1 overflow-y-auto px-3 py-4 flex flex-column gap-2">

      <span class="text-xs font-bold uppercase pl-2 mb-2" style="color: #666;">
        Gestión
      </span>

      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive
         #rla="routerLinkActive"
         [routerLinkActiveOptions]="{ exact: true }"
         (click)="cerrarMenu()"
         class="flex align-items-center gap-3 p-3 border-round-lg cursor-pointer text-decoration-none"
         [style]="rla.isActive
            ? 'background:#059669;color:#fff;font-weight:700;box-shadow:0 8px 18px rgba(5,150,105,.22);'
            : 'background:transparent;color:#ccc;'">
        <i [class]="item.icon + ' text-lg'"></i>
        <span class="font-bold">{{ item.label }}</span>
      </a>

      <div class="my-3" style="border-top: 1px solid #2e2e3e;"></div>

      <span class="text-xs font-bold uppercase pl-2 mb-2" style="color: #666;">
        Operación
      </span>

      <button (click)="operarEmpresa(); cerrarMenu()"
              class="flex align-items-center gap-3 p-3 border-round-lg cursor-pointer text-decoration-none w-full text-left border-none"
              style="background: transparent; color: #ccc;"
              type="button">
        <i class="pi pi-briefcase text-lg"></i>
        <span class="font-bold">Operar Empresa</span>
        <i class="pi pi-arrow-right text-xs ml-auto" style="color: #888;"></i>
      </button>
    </div>

    <!-- FOOTER -->
    <div class="p-3"
         style="border-top: 1px solid #2e2e3e; background-color: #1e1e2e; flex-shrink: 0;">

      <div class="flex align-items-center gap-3 mb-3 p-2 border-round-lg"
           style="background-color: #2e2e3e;">
        <div class="bg-primary text-white font-bold border-circle flex align-items-center justify-content-center"
             style="width: 2.5rem; height: 2.5rem; min-width: 2.5rem;">
          <i class="pi pi-user"></i>
        </div>

        <div class="flex flex-column overflow-hidden">
          <span class="font-bold text-sm" style="color: #ddd;">
            Administrador
          </span>
          <span class="text-xs white-space-nowrap text-overflow-ellipsis overflow-hidden"
                style="color: #888;"
                [title]="usuarioNombre()">
            {{ usuarioNombre() }}
          </span>
        </div>
      </div>

      <button
        pButton
        type="button"
        class="p-button-outlined p-button-danger w-full font-bold flex align-items-center justify-content-center gap-2"
        style="min-height: 2.75rem;"
        (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>Cerrar Sesión</span>
      </button>
    </div>

  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="flex-1 flex flex-column h-full relative overflow-hidden">

    <!-- TOPBAR MÓVIL -->
    <div class="md:hidden flex-shrink-0 sticky top-0 h-4rem surface-0 border-bottom-1 surface-border shadow-2
                flex align-items-center px-3"
         style="z-index: 900;">
      <button pButton
              icon="pi pi-bars"
              class="p-button-text p-button-secondary text-2xl p-0"
              (click)="toggleSidebar()">
      </button>

      <span class="ml-3 font-bold text-900 text-xl">
        PANEL ADMIN
      </span>
    </div>

    <!-- CONTENIDO -->
    <div class="flex-1 overflow-auto p-2 md:p-4">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
