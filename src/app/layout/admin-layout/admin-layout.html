<div class="flex h-screen bg-gray-50 overflow-hidden">

  <!-- SIDEBAR ADMIN -->
  <div class="bg-gray-900 shadow-8 flex flex-column relative h-full" style="width: 17rem;">

    <!-- Cabecera -->
    <div class="flex align-items-center gap-3 p-4 border-bottom-1 border-gray-800">
      <div class="bg-primary flex align-items-center justify-content-center border-round-lg"
           style="width: 40px; height: 40px;">
        <i class="pi pi-shield-check text-white text-xl"></i>
      </div>
      <div class="flex flex-column">
        <span class="text-xl font-bold text-white">PANEL ADMIN</span>
        <span class="text-xs text-gray-400 uppercase">{{ usuarioNombre() }}</span>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="flex-grow-1 px-3 py-4 flex flex-column gap-2">
      <ng-container *ngFor="let item of navItems">
        <a [routerLink]="item.path"
           routerLinkActive="bg-primary text-white"
           (click)="cerrarMenu()"
           class="flex align-items-center gap-3 p-3 border-round-lg text-gray-300
                  hover:bg-gray-800 cursor-pointer text-decoration-none transition-colors">
          <i [class]="item.icon + ' text-lg'"></i>
          <span class="font-medium">{{ item.label }}</span>
        </a>
      </ng-container>
    </nav>

    <!-- Footer -->
    <div class="border-top-1 border-gray-800 p-3">
      <button class="w-full p-3 border-round-lg text-gray-300 hover:bg-gray-800
                     flex align-items-center gap-3 cursor-pointer"
              (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>Cerrar Sesión</span>
      </button>
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="flex-1 overflow-auto p-4">
    <router-outlet />
  </div>

</div>
