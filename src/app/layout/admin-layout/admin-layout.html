<div class="flex h-screen bg-gray-50 overflow-hidden">

  <!-- SIDEBAR ADMIN -->
  <div class="bg-gray-900 flex flex-column h-full flex-shrink-0" style="width: 17rem;">

    <!-- Cabecera -->
    <div class="flex align-items-center gap-3 p-4 border-bottom-1 border-gray-700">
      <div class="bg-primary flex align-items-center justify-content-center border-round-lg flex-shrink-0"
           style="width: 40px; height: 40px;">
        <i class="pi pi-shield-check text-white text-xl"></i>
      </div>
      <div class="flex flex-column overflow-hidden">
        <span class="text-base font-bold text-white">PANEL ADMIN</span>
        <span class="text-xs text-gray-400 white-space-nowrap overflow-hidden text-overflow-ellipsis">
          {{ usuarioNombre() }}
        </span>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="flex-grow-1 px-3 py-4 flex flex-column gap-2">

      <span class="text-xs font-bold text-gray-500 uppercase tracking-widest pl-2 mb-1">
        Gestión
      </span>

      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="bg-primary text-white"
         (click)="cerrarMenu()"
         class="flex align-items-center gap-3 p-3 border-round-lg text-gray-300
                hover:bg-gray-800 cursor-pointer text-decoration-none transition-colors">
        <i [class]="item.icon + ' text-lg'"></i>
        <span class="font-medium">{{ item.label }}</span>
      </a>

      <!-- Separador -->
      <div class="border-top-1 border-gray-700 my-3"></div>

      <span class="text-xs font-bold text-gray-500 uppercase tracking-widest pl-2 mb-1">
        Operación
      </span>

      <!-- Botón operar empresa -->
      <button
        (click)="operarEmpresa()"
        class="flex align-items-center gap-3 p-3 border-round-lg text-gray-300
               hover:bg-gray-800 cursor-pointer transition-colors w-full text-left
               border-none bg-transparent">
        <i class="pi pi-briefcase text-lg"></i>
        <span class="font-medium">Operar Empresa</span>
        <i class="pi pi-arrow-right text-xs ml-auto text-gray-500"></i>
      </button>

    </nav>

    <!-- Footer -->
    <div class="border-top-1 border-gray-700 p-3">
      <button
        (click)="logout()"
        class="w-full flex align-items-center gap-3 p-3 border-round-lg
               text-red-400 hover:bg-red-900 hover:text-red-200
               cursor-pointer transition-colors border-none bg-transparent">
        <i class="pi pi-sign-out"></i>
        <span class="font-medium">Cerrar Sesión</span>
      </button>
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="flex-1 overflow-auto p-4">
    <router-outlet />
  </div>

</div>
