<div class="surface-card p-4 shadow-2 border-round">
    
    <p-toolbar styleClass="mb-4 gap-2">
        <ng-template pTemplate="left">
            <h2 class="m-0 text-900 font-bold mr-4">Directorio de Clientes</h2>
            <button pButton pRipple label="Nuevo Cliente" icon="pi pi-plus" class="p-button-success" (click)="abrirNuevo()"></button>
        </ng-template>
    </p-toolbar>

    <p-table #dt [value]="clientes" [rows]="10" [paginator]="true" [globalFilterFields]="['documento_identidad', 'nombre_razon_social']" responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-striped p-datatable-gridlines">
        <ng-template pTemplate="caption">
            <div class="flex align-items-center justify-content-between">
                <span class="p-input-icon-left w-full md:w-auto">
                    <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Buscar DNI, RUC o Nombre..." class="w-full" />
                </span>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="documento_identidad" style="width: 15%">DNI / RUC <p-sortIcon field="documento_identidad"></p-sortIcon></th>
                <th pSortableColumn="nombre_razon_social">Razón Social / Nombres <p-sortIcon field="nombre_razon_social"></p-sortIcon></th>
                <th style="width: 15%">Teléfono</th>
                <th>Correo</th>
                <th class="text-center" style="width: 120px">Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-cliente>
            <tr>
                <td class="font-bold text-600">{{ cliente.documento_identidad }}</td>
                <td class="font-bold">{{ cliente.nombre_razon_social }}</td>
                <td>{{ cliente.telefono || '-' }}</td>
                <td>{{ cliente.correo || '-' }}</td>
                <td class="text-center">
                    <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-info p-button-text mr-2" (click)="editarCliente(cliente)"></button>
                    <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-danger p-button-text" (click)="borrarCliente(cliente)"></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="5" class="text-center p-4">No se encontraron clientes registrados.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog [(visible)]="clienteDialog" [style]="{width: '500px', maxWidth: '90vw'}" header="Ficha del Cliente" [modal]="true" styleClass="p-fluid">
    
    <ng-template pTemplate="content">
        <div class="flex flex-column gap-4 mt-2">

            <div class="flex flex-column gap-2">
                <label for="doc" class="font-bold text-700">DNI o RUC <span class="text-red-500">*</span></label>
                <div class="flex gap-2">
                    <input pInputText id="doc" [(ngModel)]="clienteActual.documento_identidad" placeholder="Ej. 20123456789" class="w-full" autofocus />
                    <button pButton icon="pi pi-search" [loading]="buscandoApi" (click)="buscarDocumento()" class="p-button-primary px-3" pTooltip="Buscar en SUNAT/RENIEC"></button>
                </div>
            </div>

            <div class="flex flex-column gap-2">
                <label for="nombre" class="font-bold text-700">Razón Social / Nombres <span class="text-red-500">*</span></label>
                <input pInputText id="nombre" [(ngModel)]="clienteActual.nombre_razon_social" required placeholder="Nombre legal del cliente" />
            </div>

            <div class="flex flex-column gap-2">
                <label for="direccion" class="font-bold text-700">Dirección</label>
                <input pInputText id="direccion" [(ngModel)]="clienteActual.direccion" placeholder="Av. Principal 123" />
            </div>

            <div class="grid m-0">
                <div class="col-12 md:col-6 p-0 md:pr-2 mb-3 md:mb-0 flex flex-column gap-2">
                    <label for="telefono" class="font-bold text-700">Teléfono</label>
                    <input pInputText id="telefono" [(ngModel)]="clienteActual.telefono" placeholder="Celular o Fijo" />
                </div>
                
                <div class="col-12 md:col-6 p-0 md:pl-2 flex flex-column gap-2">
                    <label for="correo" class="font-bold text-700">Correo Electrónico</label>
                    <input pInputText id="correo" [(ngModel)]="clienteActual.correo" placeholder="correo@empresa.com" />
                </div>
            </div>

        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2 pt-3">
            <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text p-button-secondary" (click)="ocultarDialog()"></button>
            <button pButton pRipple label="Guardar" icon="pi pi-save" class="p-button-primary px-4" (click)="guardarCliente()" [disabled]="enviando"></button>
        </div>
    </ng-template>
</p-dialog>
