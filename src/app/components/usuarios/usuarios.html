<p-toast />
<p-confirmDialog />

<div class="p-4">

  <!-- Header -->
  <div class="flex align-items-center justify-content-between mb-4">
    <div>
      <h2 class="text-2xl font-bold text-900 m-0">Gestión de Usuarios</h2>
      <p class="text-color-secondary mt-1 mb-0">Administra los accesos al sistema</p>
    </div>
    <p-button
      label="Nuevo Usuario"
      icon="pi pi-plus"
      (onClick)="abrirModal()" />
  </div>

  <!-- Tabla -->
  <div class="surface-card border-round-xl shadow-1 overflow-hidden">
    <table class="w-full">
      <thead class="surface-ground">
        <tr>
          <th class="text-left p-3 text-sm font-bold text-color-secondary uppercase">Email</th>
          <th class="text-left p-3 text-sm font-bold text-color-secondary uppercase">Rol</th>
          <th class="text-left p-3 text-sm font-bold text-color-secondary uppercase">Estado</th>
          <th class="text-right p-3 text-sm font-bold text-color-secondary uppercase">Acciones</th>
        </tr>
      </thead>
      <tbody>

        <!-- Loading -->
        <tr *ngIf="cargando()">
          <td colspan="4" class="text-center p-6 text-color-secondary">
            <i class="pi pi-spin pi-spinner text-2xl"></i>
            <p class="mt-2">Cargando usuarios...</p>
          </td>
        </tr>

        <!-- Sin usuarios -->
        <tr *ngIf="!cargando() && usuarios.length === 0">
          <td colspan="4" class="text-center p-6 text-color-secondary">
            <i class="pi pi-users text-4xl"></i>
            <p class="mt-2">No hay usuarios registrados</p>
          </td>
        </tr>

        <!-- Filas -->
        <tr *ngFor="let u of usuarios"
            class="border-top-1 surface-border">

          <!-- Email -->
          <td class="p-3">
            <div class="flex align-items-center gap-2">
              <p-tag
                [value]="u.email || u.id"
                severity="secondary"
                [rounded]="true" />
            </div>
          </td>

          <!-- Rol -->
          <td class="p-3">
            <p-select
              [options]="rolesOpciones"
              [ngModel]="u.rol"
              (ngModelChange)="cambiarRol(u, $event)"
              optionLabel="label"
              optionValue="value"
              [style]="{'min-width': '130px'}" />
          </td>

          <!-- Estado -->
          <td class="p-3">
            <p-tag
              [value]="u.activo ? 'Activo' : 'Inactivo'"
              [severity]="u.activo ? 'success' : 'warn'" />
          </td>

          <!-- Acciones -->
          <td class="p-3">
            <div class="flex gap-2 justify-content-end">
              <p-button
                [icon]="u.activo ? 'pi pi-ban' : 'pi pi-check-circle'"
                [severity]="u.activo ? 'warn' : 'success'"
                [outlined]="true"
                size="small"
                [pTooltip]="u.activo ? 'Desactivar' : 'Activar'"
                (onClick)="toggleActivo(u)" />
              <p-button
                icon="pi pi-trash"
                severity="danger"
                [outlined]="true"
                size="small"
                pTooltip="Eliminar (solo desactivados)"
                [disabled]="u.activo"
                (onClick)="confirmarEliminar(u)" />
            </div>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</div>

<!-- Modal Nuevo Usuario -->
<p-dialog
  header="Nuevo Usuario"
  [(visible)]="modalVisible"
  [modal]="true"
  [style]="{'width': '420px'}"
  [closable]="!guardando">

  <div class="flex flex-column gap-4 pt-2">

    <div class="flex flex-column gap-2">
      <label class="font-medium text-900">
        Email <span class="text-red-500">*</span>
      </label>
      <input
        pInputText
        type="email"
        [(ngModel)]="nuevoEmail"
        placeholder="vendedor@empresa.com"
        class="w-full" />
    </div>

    <div class="flex flex-column gap-2">
      <label class="font-medium text-900">
        Contraseña temporal <span class="text-red-500">*</span>
      </label>
      <p-password
        [(ngModel)]="nuevoPassword"
        placeholder="Mínimo 6 caracteres"
        [toggleMask]="true"
        [feedback]="false"
        styleClass="w-full" />
    </div>

    <div class="flex flex-column gap-2">
      <label class="font-medium text-900">Rol</label>
      <p-select
        [options]="rolesOpciones"
        [(ngModel)]="nuevoRol"
        optionLabel="label"
        optionValue="value"
        styleClass="w-full" />
    </div>

    <!-- Error -->
    <div *ngIf="errorModal"
         class="bg-red-50 border-round p-3 text-red-600 text-sm flex gap-2 align-items-center">
      <i class="pi pi-exclamation-circle"></i>
      {{ errorModal }}
    </div>

  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      severity="secondary"
      [text]="true"
      [disabled]="guardando"
      (onClick)="modalVisible = false" />
    <p-button
      label="Crear Usuario"
      icon="pi pi-check"
      [loading]="guardando"
      (onClick)="crearUsuario()" />
  </ng-template>

</p-dialog>
