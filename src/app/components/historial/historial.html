<div class="surface-card p-4 shadow-2 border-round">
    <div class="flex justify-content-between align-items-center mb-4">
        <h2 class="m-0 text-900 font-bold">Historial de Cotizaciones</h2>
        <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input pInputText type="text" placeholder="Buscar cliente o folio..." />
        </span>
    </div>

    <p-table [value]="cotizaciones" [paginator]="true" [rows]="5" responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-striped">
        <ng-template pTemplate="header">
            <tr>
                <th>Folio</th>
                <th>Empresa</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th>Total (S/)</th>
                <th>Estado</th>
                <th class="text-center">Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-cotizacion>
            <tr>
                <td class="font-bold">{{ cotizacion.folio }}</td>
                <td>
                    <p-tag [value]="cotizacion.empresa" [severity]="cotizacion.empresa === 'W&M' ? 'info' : 'secondary'"></p-tag>
                </td>
                
                <td>{{ cotizacion.cliente_nombre }}</td>
                
                <td>{{ cotizacion.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
                
                <td class="font-bold text-green-600">{{ cotizacion.total | number:'1.2-2' }}</td>
                <td>
                    <p-select [options]="opcionesEstado" [(ngModel)]="cotizacion.estado" optionLabel="label" optionValue="value" (onChange)="cambiarEstado(cotizacion)" appendTo="body" styleClass="w-full">
                        <ng-template let-opcion pTemplate="selectedItem">
                            <p-tag [value]="opcion.value" [severity]="getSeverity(opcion.value)"></p-tag>
                        </ng-template>
                        <ng-template let-opcion pTemplate="item">
                            <p-tag [value]="opcion.value" [severity]="getSeverity(opcion.value)"></p-tag>
                        </ng-template>
                    </p-select>
                </td>
                <td class="text-center">
                    <button pButton pRipple icon="pi pi-file-pdf" class="p-button-rounded p-button-danger p-button-text" pTooltip="Descargar PDF" (click)="descargarPDF(cotizacion)"></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="7" class="text-center p-4">No se encontraron cotizaciones.</td>
            </tr>
        </ng-template>
    </p-table>
</div>
