<div class="min-h-screen bg-gray-50 flex p-3 md:p-5">
    
    <div class="m-auto w-full py-4" style="max-width: 900px;">

        <div class="text-center mb-5 mt-4 md:mt-0 fadeindown animation-duration-500">
            <div class="inline-flex align-items-center justify-content-center bg-white p-3 border-circle shadow-2 mb-3">
                <i class="pi pi-user text-4xl text-primary"></i>
            </div>
            <h1 class="text-900 font-bold text-3xl md:text-5xl mb-2 capitalize">¡Hola, {{ nombreUsuario }}!</h1>
            <p class="text-600 text-base md:text-xl m-0 font-medium px-2">¿Con qué empresa vas a emitir cotizaciones hoy?</p>
        </div>

        <div class="grid formgrid m-0 justify-content-center">

            <div class="col-12 md:col-6 p-2 md:p-3 fadein animation-duration-1000" *ngFor="let emp of empresas">
                
                <!-- CORRECCIÓN: border_hover con guion bajo -->
                <div class="h-full bg-white border-round-2xl shadow-2 p-4 md:p-5 cursor-pointer transition-all transition-duration-300 hover:shadow-6 border-top-3 surface-border {{ emp.border_hover }}"
                     (click)="seleccionar(emp)">

                    <div class="flex justify-content-between align-items-start mb-4">
                        <!-- CORRECCIÓN: bg_class con guion bajo -->
                        <div class="p-2 border-round-xl {{ emp.bg_class }} flex align-items-center justify-content-center" style="width: 70px; height: 70px;">
                            
                            <!-- CORRECCIÓN CLAVE: Usamos ruta_logo para el IF -->
                            <ng-container *ngIf="emp.ruta_logo; else noLogo">
                                <img [src]="emp.ruta_logo" (error)="emp.ruta_logo = ''" [alt]="emp.nombre_comercial" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                            </ng-container>

                            <ng-template #noLogo>
                                <!-- CORRECCIÓN: text_class con guion bajo -->
                                <i class="{{ emp.icono }} text-4xl {{ emp.text_class }}"></i>
                            </ng-template>
                        </div>
                        <i class="pi pi-arrow-up-right text-300 text-2xl transition-colors transition-duration-300 hover:text-700"></i>
                    </div>

                    <!-- CORRECCIÓN: nombre_comercial -->
                    <h2 class="text-2xl md:text-3xl font-bold text-900 m-0 mb-3">{{ emp.nombre_comercial }}</h2>
                    
                    <div class="flex flex-column gap-2">
                        <span class="text-700 font-medium flex align-items-center text-sm md:text-base">
                            <i class="pi pi-id-card mr-2 text-500"></i> 
                            RUC: {{ emp.ruc }}
                        </span>
                        <span class="text-500 text-xs md:text-sm flex align-items-center line-height-3">
                            <i class="pi pi-building mr-2 text-500"></i> 
                            <!-- CORRECCIÓN: razon_social -->
                            {{ emp.razon_social }}
                        </span>
                    </div>

                    <div class="mt-5 pt-3 border-top-1 surface-border flex align-items-center justify-content-between text-sm font-bold text-500">
                        <span>Ingresar al sistema</span>
                        <i class="pi pi-chevron-right text-xs"></i>
                    </div>
                </div>
            </div>

        </div>

        <div class="text-center mt-5 mb-4 fadein animation-duration-1000 animation-delay-300">
            <button pButton label="Cambiar de Usuario" icon="pi pi-sign-out" class="p-button-text p-button-secondary font-bold" routerLink="/login"></button>
        </div>

    </div>
</div>
