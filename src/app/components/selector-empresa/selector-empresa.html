<div class="flex flex-column align-items-center justify-content-center min-h-screen bg-gray-50 p-4">
    <div class="text-center mb-6">
        <h1 class="text-4xl font-bold text-900 mb-2">Panel de Control</h1>
        <p class="text-xl text-600">Selecciona la empresa para gestionar la cotización</p>
    </div>

    <div class="flex flex-column md:flex-row gap-5 w-full max-w-50rem justify-content-center">
        
        <div *ngFor="let empresa of empresas" class="w-full md:w-6">
            <p-card styleClass="text-center w-full cursor-pointer shadow-3 hover:shadow-6 transition-all transition-duration-300"
                    (click)="seleccionar(empresa)">
                
                <div class="py-4 flex flex-column align-items-center justify-content-center h-10rem">
                    
                    <ng-container *ngIf="empresa.rutaLogo; else iconFallback">
                        <img [src]="empresa.rutaLogo" (error)="empresa.rutaLogo = ''" alt="Logo" style="max-height: 90px; max-width: 100%; object-fit: contain;">
                    </ng-container>
                    
                    <ng-template #iconFallback>
                        <div class="border-circle inline-flex justify-content-center align-items-center" 
                             [style.backgroundColor]="empresa.color + '20'" 
                             style="width: 80px; height: 80px;">
                            <i [class]="empresa.logo" [style.color]="empresa.color" class="text-5xl"></i>
                        </div>
                    </ng-template>

                    <h2 class="text-2xl font-semibold mt-4 mb-0 text-800">{{ empresa.nombre }}</h2>
                </div>

                <ng-template pTemplate="footer">
                    <p-button [label]="'Ingresar '" 
                              icon="pi pi-arrow-right" 
                              iconPos="right"
                              class="w-full" 
                              styleClass="w-full"
                              [style]="{ background: empresa.color, border: 'none' }">
                    </p-button>
                </ng-template>
            </p-card>
        </div>

    </div>
</div>
